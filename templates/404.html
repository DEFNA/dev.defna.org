{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
  <section class="py-32 text-center">
    <div class="px-4 mx-auto max-w-lg">
      <p class="text-7xl font-bold text-django-green-pale">404</p>
      <h1 class="mt-4 text-2xl font-bold text-text">Page not found</h1>
      <p class="mt-3 text-text-muted">Sorry, we couldn't find the page you're looking for.</p>
      <a href="/" class="inline-flex items-center py-2.5 px-5 mt-8 text-sm font-semibold text-white rounded-md transition-colors bg-django-green hover:bg-django-green-dark">
        Go to the homepage
      </a>
    </div>
  </section>
{% endblock content %}
