{% load static %}
<header class="bg-white border-b border-gray-100 sticky top-0 z-40">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" aria-label="Main navigation">
    <div class="flex items-center justify-between h-16">

      {# Logo #}
      <a href="{% url 'home' %}" class="flex items-center gap-2 shrink-0">
        <span class="text-xl font-bold text-django-green tracking-tight">DEFNA</span>
        <span class="hidden sm:block text-xs text-text-muted font-medium leading-tight max-w-[160px]">
          Django Events Foundation<br>North America
        </span>
      </a>

      {# Desktop nav #}
      <div class="hidden md:flex items-center gap-1">
        <a href="{% url 'home' %}"
           class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-django-green hover:bg-django-green-pale transition-colors
                  {% if request.resolver_match.url_name == 'home' %}text-django-green bg-django-green-pale{% endif %}">
          Home
        </a>
        <a href="{% url 'about' %}"
           class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-django-green hover:bg-django-green-pale transition-colors
                  {% if request.resolver_match.url_name == 'about' %}text-django-green bg-django-green-pale{% endif %}">
          About
        </a>

        {# Events dropdown #}
        <div class="relative group">
          <button class="flex items-center gap-1 px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-django-green hover:bg-django-green-pale transition-colors
                         {% if request.resolver_match.url_name in 'djangocon,sponsored-events' %}text-django-green bg-django-green-pale{% endif %}"
                  aria-haspopup="true" aria-expanded="false">
            Events
            <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          <div class="absolute left-0 mt-1 w-52 bg-white rounded-lg shadow-lg border border-gray-100 py-1
                      opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-150">
            <a href="{% url 'djangocon' %}"
               class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-django-green-pale hover:text-django-green">
              <svg class="w-4 h-4 text-django-green-light shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              DjangoCon US
            </a>
            <a href="{% url 'sponsored-events' %}"
               class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-django-green-pale hover:text-django-green">
              <svg class="w-4 h-4 text-django-green-light shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/>
              </svg>
              Sponsored Events
            </a>
          </div>
        </div>

        <a href="{% url 'grants' %}"
           class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-django-green hover:bg-django-green-pale transition-colors
                  {% if request.resolver_match.url_name == 'grants' %}text-django-green bg-django-green-pale{% endif %}">
          Grants
        </a>
        <a href="{% url 'contact' %}"
           class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-django-green hover:bg-django-green-pale transition-colors
                  {% if request.resolver_match.url_name == 'contact' %}text-django-green bg-django-green-pale{% endif %}">
          Contact
        </a>
        <a href="{% url 'donate' %}"
           class="ml-2 px-4 py-2 rounded-md text-sm font-semibold bg-defna-gold text-white hover:bg-defna-gold-dark transition-colors shadow-sm">
          Donate
        </a>
      </div>

      {# Mobile menu button #}
      <button id="mobile-menu-btn"
              class="md:hidden p-2 rounded-md text-gray-500 hover:text-django-green hover:bg-django-green-pale transition-colors"
              aria-controls="mobile-menu" aria-expanded="false">
        <span class="sr-only">Open menu</span>
        <svg id="menu-icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg id="menu-icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    {# Mobile menu #}
    <div id="mobile-menu" class="hidden md:hidden pb-4 border-t border-gray-100 pt-3 space-y-1">
      <a href="{% url 'home' %}" class="block px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-django-green hover:bg-django-green-pale">Home</a>
      <a href="{% url 'about' %}" class="block px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-django-green hover:bg-django-green-pale">About</a>
      <div class="pl-3">
        <p class="px-3 py-1 text-xs font-semibold uppercase tracking-widest text-text-muted">Events</p>
        <a href="{% url 'djangocon' %}" class="block px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-django-green hover:bg-django-green-pale">DjangoCon US</a>
        <a href="{% url 'sponsored-events' %}" class="block px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-django-green hover:bg-django-green-pale">Sponsored Events</a>
      </div>
      <a href="{% url 'grants' %}" class="block px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-django-green hover:bg-django-green-pale">Grants</a>
      <a href="{% url 'contact' %}" class="block px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-django-green hover:bg-django-green-pale">Contact</a>
      <div class="pt-2">
        <a href="{% url 'donate' %}" class="block px-4 py-2 rounded-md text-sm font-semibold bg-defna-gold text-white hover:bg-defna-gold-dark text-center transition-colors">Donate</a>
      </div>
    </div>
  </nav>
</header>

<script>
  (function () {
    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');
    const iconOpen = document.getElementById('menu-icon-open');
    const iconClose = document.getElementById('menu-icon-close');
    btn.addEventListener('click', function () {
      const expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!expanded));
      menu.classList.toggle('hidden');
      iconOpen.classList.toggle('hidden');
      iconClose.classList.toggle('hidden');
    });
  })();
</script>
